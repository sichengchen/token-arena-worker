# CLI package (@poco-ai/tokens-burned): test + build on cli changes, PRs, and manual runs.
# Publishes to npm when a v* tag is pushed, or when workflow_dispatch has publish_to_npm enabled.

name: Publish CLI to npm

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - "cli/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/npm-publish.yml"
  pull_request:
    paths:
      - "cli/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/npm-publish.yml"
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test CLI
        run: pnpm --filter ./cli test

      - name: Build CLI
        run: pnpm --filter ./cli build

      - name: Publish to npm
        run: pnpm --filter ./cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
